name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  buildx:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v4.1.0
      
    - name: Git Semantic Version
      uses: PaulHatch/semantic-version@v6.0.2
      with:
        major_pattern: "major:"
        minor_pattern: "feat:"
        version_format: "${major}.${minor}.${patch}-prerelease${increment}"
      id: version
        
        
    - name: Docker login
      env:
        DOCKER_USER: ${{ secrets.DOCKER_USER }}
        DOCKER_PASS: ${{ secrets.DOCKER_PASS }}
      run:  |
        docker login -u $DOCKER_USER -p $DOCKER_PASS
        echo "New Version: $NEW_VERSION !!!!!!!"
    - name: Build Docker Image
      env:
        NEW_VERSION: ${{ steps.version.outputs.version }}
      run: |
        docker buildx build --platform linux/amd64,linux/arm64 -t yexhz/docker-graphql:$NEW_VERSION .
        docker buildx build --platform linux/amd64,linux/arm64 -t yexhz/docker-graphql:latest .
      
    - name: Push Docker Image
      env:
        NEW_VERSION: ${{ steps.version.outputs.version }}
      run: |
        docker push yexhz/docker-graphql:$NEW_VERSION
        docker push yexhz/docker-graphql:latest

    
    # - name: Build the Docker image
    #   run: docker build . --file Dockerfile --tag my-image-name:$(date +%s)
